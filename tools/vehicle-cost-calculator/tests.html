<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vehicle Cost Calculator tests</title>
    <link rel="stylesheet" href="calculator.css?v=5" />
    <style>
      .test-shell { width: min(900px, calc(100% - 28px)); margin: 35px auto; }
      .test-summary { display: flex; gap: 12px; margin: 20px 0; }
      .test-summary strong { padding: 12px 16px; border-radius: 999px; background: var(--foam); }
      .test-list { display: grid; gap: 8px; padding: 0; list-style: none; }
      .test-list li { padding: 12px 15px; border: 1px solid var(--line); border-radius: 13px; background: var(--card); }
      .test-list .pass { border-left: 5px solid #128a74; }
      .test-list .fail { border-left: 5px solid var(--danger); }
      .test-list small { display: block; margin-top: 5px; color: var(--muted); }
    </style>
    <script type="module" src="tests.js?v=5"></script>
  </head>
  <body>
    <main class="test-shell">
      <p class="kicker">Dependency-free browser tests</p>
      <h1>Vehicle Cost Calculator</h1>
      <p>These tests cover the manual calculations and a temporary IndexedDB database. They do not make network requests.</p>
      <div class="test-summary" aria-live="polite"><strong id="test-total">Running…</strong><strong id="test-passed">0 passed</strong><strong id="test-failed">0 failed</strong></div>
      <ul id="test-results" class="test-list"></ul>
      <p><a class="secondary-button" href="index.html">Return to calculator</a></p>
    </main>
  </body>
</html>
